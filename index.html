<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🧊 Мой холодильник</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      padding: 12px;
      min-height: 100vh;
    }
    h1 { font-size: 20px; margin-bottom: 14px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 14px; }
    .tab {
      flex: 1; padding: 9px 4px; border: none; border-radius: 10px;
      background: var(--tg-theme-secondary-bg-color, #f0f0f0);
      color: var(--tg-theme-text-color, #000);
      cursor: pointer; font-size: 12px; font-weight: 500;
    }
    .tab.active {
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #fff);
    }
    .card {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--tg-theme-secondary-bg-color, #f8f8f8);
      border-radius: 14px; padding: 13px; margin-bottom: 10px;
    }
    .card-left { flex: 1; }
    .card-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
    .card-sub  { font-size: 12px; color: gray; margin-bottom: 5px; }
    .badge {
      display: inline-block; padding: 3px 9px;
      border-radius: 20px; font-size: 11px; font-weight: 600;
    }
    .badge-ok     { background: #e8f5e9; color: #2e7d32; }
    .badge-warn   { background: #fff3e0; color: #e65100; }
    .badge-danger { background: #fce4ec; color: #c62828; }
    .del-btn {
      background: none; border: none;
      font-size: 22px; cursor: pointer; padding: 4px; opacity: 0.7;
    }
    .del-btn:active { opacity: 1; }
    .form { display: flex; flex-direction: column; gap: 10px; }
    label { font-size: 13px; color: gray; }
    input {
      padding: 11px; border-radius: 10px;
      border: 1.5px solid var(--tg-theme-hint-color, #ddd);
      font-size: 14px; width: 100%;
      background: var(--tg-theme-secondary-bg-color, #f8f8f8);
      color: var(--tg-theme-text-color, #000);
      outline: none;
    }
    input:focus { border-color: var(--tg-theme-button-color, #2481cc); }
    .btn-add {
      padding: 13px; border: none; border-radius: 13px; width: 100%;
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #fff);
      font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .btn-add:active { opacity: 0.85; }
    #status {
      text-align: center; font-size: 13px; height: 22px;
      color: var(--tg-theme-button-color, #2481cc);
      margin-bottom: 6px; transition: opacity 0.3s;
    }
    .counter {
      display: inline-block;
      background: var(--tg-theme-button-color, #2481cc);
      color: #fff; border-radius: 20px;
      padding: 0 6px; font-size: 11px; margin-left: 4px;
    }
    .tab.active .counter { background: rgba(255,255,255,0.35); color: #fff; }
    .section-title { font-size: 12px; color: gray; margin-bottom: 8px; padding-left: 2px; }
    .empty { text-align: center; color: gray; padding: 40px 20px; font-size: 14px; line-height: 2; }
  </style>
</head>
<body>

<h1>🧊 Мой холодильник</h1>

<div class="tabs">
  <button class="tab active" onclick="showTab('list')"   id="tab-btn-list">📋 Список</button>
  <button class="tab"        onclick="showTab('add')"    id="tab-btn-add">➕ Добавить</button>
  <button class="tab"        onclick="showTab('expire')" id="tab-btn-expire">⚠️ Истекает</button>
</div>

<div id="status"></div>

<div id="tab-list">
  <div id="items-list"><div class="empty">⏳ Загрузка...</div></div>
</div>

<div id="tab-add" style="display:none">
  <div class="form">
    <label>Название продукта</label>
    <input id="inp-name" type="text" placeholder="Например: Молоко, Яйца, Кефир..."/>
    <label>Годен до (необязательно)</label>
    <input id="inp-expiry" type="date"/>
    <button class="btn-add" onclick="addItem()">✅ Добавить в холодильник</button>
  </div>
</div>

<div id="tab-expire" style="display:none">
  <div id="expire-list"><div class="empty">⏳ Загрузка...</div></div>
</div>

<script>
  // ⚠️ ВСТАВЬ СЮДА СВОЙ URL ИЗ APPS SCRIPT
  const API_URL = 'https://script.google.com/macros/s/AKfycbyXylzVH9IBSQ_A4MzZb1-ZITSN_PpxRam1E6ncXmPymdje1LXwjq1dK1XuOjgKWSx9/exec';

  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  let allItems = [];

  async function loadItems() {
    try {
      const res  = await fetch(API_URL + '?action=getAll');
      const data = await res.json();
      allItems   = data.items || [];
      renderList();
      renderExpire();
      updateTabBadges();
    } catch(err) {
      document.getElementById('items-list').innerHTML =
        '<div class="empty">❌ Ошибка загрузки<br>Проверь URL Apps Script</div>';
    }
  }

  function formatDate(raw) {
    if (!raw) return '';
    const d = new Date(raw);
    if (!isNaN(d)) return d.toLocaleDateString('ru-RU');
    return String(raw);
  }

  // Всегда считаем по дате — игнорируем статичное значение из таблицы
  function getDaysLeft(item) {
    if (!item.expiry) return null;
    const d = new Date(item.expiry);
    if (isNaN(d)) return null;
    const now = new Date(); now.setHours(0,0,0,0);
    return Math.ceil((d - now) / 86400000);
  }

  function expiryBadge(item) {
    const d = getDaysLeft(item);
    if (d === null) return '';
    if (d < 0)   return `<span class="badge badge-danger">❌ Просрочено на ${-d} дн.</span>`;
    if (d === 0) return `<span class="badge badge-danger">⚠️ Истекает СЕГОДНЯ</span>`;
    if (d <= 3)  return `<span class="badge badge-warn">⏳ Осталось ${d} дн.</span>`;
    return       `<span class="badge badge-ok">✅ Годен ещё ${d} дн.</span>`;
  }

  function cardHTML(item) {
    const nameSafe  = item.name.replace(/'/g, "\\'");
    const addedFmt  = formatDate(item.added);
    const expiryFmt = formatDate(item.expiry);
    return `
      <div class="card">
        <div class="card-left">
          <div class="card-name">${item.name}</div>
          <div class="card-sub">
            Добавлено: ${addedFmt}
            ${expiryFmt ? ' · Годен до: ' + expiryFmt : ''}
          </div>
          ${expiryBadge(item)}
        </div>
        <button class="del-btn" onclick="confirmDelete(${item.rowNum}, '${nameSafe}')">🗑️</button>
      </div>`;
  }

  function renderList() {
    const el = document.getElementById('items-list');
    if (!allItems.length) {
      el.innerHTML = '<div class="empty">🧊 Холодильник пуст<br>Перейди на вкладку ➕ Добавить</div>';
      return;
    }
    const sorted = [...allItems].sort((a, b) => {
      const da = getDaysLeft(a) ?? 9999;
      const db = getDaysLeft(b) ?? 9999;
      return da - db;
    });
    el.innerHTML =
      `<div class="section-title">Позиций в холодильнике: ${allItems.length}</div>` +
      sorted.map(cardHTML).join('');
  }

  function renderExpire() {
    const el  = document.getElementById('expire-list');
    const exp = allItems.filter(i => { const d = getDaysLeft(i); return d !== null && d <= 3; });
    if (!exp.length) {
      el.innerHTML = '<div class="empty">✅ Все продукты свежие!<br><br>Здесь появятся продукты<br>у которых срок годности<br>меньше 3 дней</div>';
      return;
    }
    el.innerHTML =
      `<div class="section-title">⚠️ Требуют внимания: ${exp.length}</div>` +
      exp.map(cardHTML).join('');
  }

  function updateTabBadges() {
    const expCount = allItems.filter(i => {
      const d = getDaysLeft(i);
      return d !== null && d <= 3;
    }).length;
    document.getElementById('tab-btn-list').innerHTML =
      `📋 Список<span class="counter">${allItems.length}</span>`;
    document.getElementById('tab-btn-expire').innerHTML =
      `⚠️ Истекает` + (expCount ? `<span class="counter">${expCount}</span>` : '');
  }

  async function addItem() {
    const name      = document.getElementById('inp-name').value.trim();
    const expiryRaw = document.getElementById('inp-expiry').value;
    if (!name) { tg.showAlert('⚠️ Введи название продукта'); return; }
    let expiry = '';
    if (expiryRaw) {
      expiry = new Date(expiryRaw).toLocaleDateString('ru-RU');
    }
    showStatus('Добавляю...');
    try {
      await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'add', name, expiry })
      });
      document.getElementById('inp-name').value   = '';
      document.getElementById('inp-expiry').value = '';
      showStatus('✅ ' + name + ' добавлен!');
      await loadItems();
      showTab('list');
    } catch(err) { tg.showAlert('❌ Ошибка при добавлении'); }
  }

  // Удаление через GET — решает проблему с CORS
  function confirmDelete(rowNum, name) {
    tg.showConfirm(`Удалить «${name}» из холодильника?`, async (ok) => {
      if (!ok) return;
      showStatus('Удаляю...');
      try {
        await fetch(`${API_URL}?action=delete&rowNum=${rowNum}`);
        showStatus('🗑️ ' + name + ' удалён');
        await loadItems();
      } catch(err) { tg.showAlert('❌ Ошибка при удалении'); }
    });
  }

  function showTab(tab) {
    ['list', 'add', 'expire'].forEach(t => {
      document.getElementById('tab-' + t).style.display = (t === tab) ? 'block' : 'none';
    });
    document.querySelectorAll('.tab').forEach((el, i) => {
      el.classList.toggle('active', ['list','add','expire'][i] === tab);
    });
  }

  function showStatus(msg) {
    const el = document.getElementById('status');
    el.textContent   = msg;
    el.style.opacity = '1';
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.style.opacity = '0'; }, 2500);
  }

  loadItems();
</script>
</body>
</html>
